name: Build Core

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Core Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install

      - name: Verify ABI and build host native package
        run: |
          cd packages/core
          bun run native:abi:check
          bun run build

      - name: Run core test suite
        run: |
          cd packages/core
          bun run test

  build-complete:
    name: Core - Build and Test
    needs: [test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Tests failed"
            exit 1
          fi
          echo "All tests passed"
