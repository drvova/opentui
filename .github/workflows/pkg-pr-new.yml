name: Publish Preview Packages

on:
  issue_comment:
    types: [created]

permissions: {}

jobs:
  build-native:
    if: |
      github.event.issue.pull_request &&
      github.event.issue.state == 'open' &&
      (contains(github.event.comment.body, ' /pkg-preview') ||
        startsWith(github.event.comment.body, '/pkg-preview')) &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    uses: ./.github/workflows/build-native.yml
    with:
      version: preview-pr-${{ github.event.issue.number }}

  publish:
    name: Publish Preview
    needs: [build-native]
    if: |
      github.event.issue.pull_request &&
      github.event.issue.state == 'open' &&
      (contains(github.event.comment.body, ' /pkg-preview') ||
        startsWith(github.event.comment.body, '/pkg-preview')) &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: npm-packages-preview-pr-${{ github.event.issue.number }}
          path: artifacts

      - name: Restore build outputs
        run: |
          unzip -q artifacts/npm-packages.zip -d artifacts
          rm -rf packages/core/dist packages/react/dist packages/solid/dist packages/core/node_modules/@opentui
          cp -r artifacts/npm-packages/core-dist packages/core/dist
          cp -r artifacts/npm-packages/react-dist packages/react/dist
          cp -r artifacts/npm-packages/solid-dist packages/solid/dist
          mkdir -p packages/core/node_modules
          cp -r artifacts/npm-packages/core-native-packages packages/core/node_modules/@opentui

      - name: Publish preview packages
        run: |
          find ./packages/core/node_modules/@opentui -maxdepth 1 -type d -name 'core-*' -print > /tmp/native-dirs.txt
          NATIVE_DIRS=$(tr '\n' ' ' < /tmp/native-dirs.txt)
          npx pkg-pr-new publish --no-template --commentWithSha --bun \
            './packages/core/dist' \
            $NATIVE_DIRS \
            './packages/react/dist' \
            './packages/solid/dist'
