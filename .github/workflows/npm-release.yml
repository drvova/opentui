name: NPM Snapshot Release

on:
  push:
    tags:
      - "*snapshot*"

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version_scheme.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: extract_version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Generate snapshot version
        id: version_scheme
        run: |
          COMMIT_SHA=$(git rev-parse --short=8 HEAD)
          VERSION="0.0.0-$(date +%Y%m%d)-${COMMIT_SHA}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build-native:
    needs: [prepare]
    uses: ./.github/workflows/build-native.yml
    with:
      version: ${{ needs.prepare.outputs.version }}

  publish:
    needs: [prepare, build-native]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Prepare release versions
        run: bun run prepare-release "${{ needs.prepare.outputs.version }}"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: npm-packages-${{ needs.prepare.outputs.version }}
          path: artifacts

      - name: Restore build outputs
        run: |
          unzip -q artifacts/npm-packages.zip -d artifacts
          rm -rf packages/core/dist packages/react/dist packages/solid/dist packages/core/node_modules/@opentui
          cp -r artifacts/npm-packages/core-dist packages/core/dist
          cp -r artifacts/npm-packages/react-dist packages/react/dist
          cp -r artifacts/npm-packages/solid-dist packages/solid/dist
          mkdir -p packages/core/node_modules
          cp -r artifacts/npm-packages/core-native-packages packages/core/node_modules/@opentui

      - name: Publish packages
        run: bun run publish
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          CI: true
