name: Build Native

on:
  workflow_call:
    inputs:
      version:
        description: "Version being released"
        required: true
        type: string
      isDryRun:
        description: "Whether this is a dry run release"
        required: false
        type: boolean
        default: false

jobs:
  build-native-host:
    name: Build Native Packages (${{ matrix.label }})
    strategy:
      matrix:
        include:
          - os: macos-latest
            label: darwin
            build_args: --variant darwin-x64 --variant darwin-arm64
          - os: ubuntu-latest
            label: cross
            build_args: --variant linux-x64 --variant linux-arm64 --variant win32-x64 --variant win32-arm64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux cross toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          cargo install cargo-xwin --locked

      - name: Install dependencies
        run: bun install

      - name: Verify ABI and build native packages
        run: |
          cd packages/core
          bun run native:abi:check
          bun run native:rust:test
          bun scripts/build.ts --native ${{ matrix.build_args }}

      - name: Upload native package artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-packages-${{ matrix.label }}
          path: packages/core/node_modules/@opentui/
          if-no-files-found: error
          retention-days: 7

  build-js-packages:
    name: Build JS Packages
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install

      - name: Build package dists
        run: |
          cd packages/core
          bun run build:lib
          cd ../react
          bun run build
          cd ../solid
          bun run build
          cd ../..
          mkdir -p artifacts/js-dists
          cp -r packages/core/dist artifacts/js-dists/core-dist
          cp -r packages/react/dist artifacts/js-dists/react-dist
          cp -r packages/solid/dist artifacts/js-dists/solid-dist

      - name: Upload JS dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: js-dists
          path: artifacts/js-dists/
          if-no-files-found: error
          retention-days: 7

  package-artifacts:
    name: Package Release Artifacts
    needs: [build-native-host, build-js-packages]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Darwin native packages
        uses: actions/download-artifact@v4
        with:
          name: native-packages-darwin
          path: downloads/native-darwin

      - name: Download Linux and Windows native packages
        uses: actions/download-artifact@v4
        with:
          name: native-packages-cross
          path: downloads/native-cross

      - name: Download JS dists
        uses: actions/download-artifact@v4
        with:
          name: js-dists
          path: downloads/js-dists

      - name: Merge native packages
        run: |
          mkdir -p packages/core/node_modules/@opentui
          cp -r downloads/native-darwin/* packages/core/node_modules/@opentui/
          cp -r downloads/native-cross/* packages/core/node_modules/@opentui/
          test -f packages/core/node_modules/@opentui/core-darwin-x64/libopentui.dylib
          test -f packages/core/node_modules/@opentui/core-darwin-arm64/libopentui.dylib
          test -f packages/core/node_modules/@opentui/core-linux-x64/libopentui.so
          test -f packages/core/node_modules/@opentui/core-linux-arm64/libopentui.so
          test -f packages/core/node_modules/@opentui/core-win32-x64/opentui.dll
          test -f packages/core/node_modules/@opentui/core-win32-arm64/opentui.dll

      - name: Package native binaries
        run: |
          set -e
          mkdir -p artifacts/native-darwin-x64 artifacts/native-darwin-arm64 artifacts/native-linux-x64 artifacts/native-linux-arm64 artifacts/native-windows-x64 artifacts/native-windows-arm64
          cp packages/core/node_modules/@opentui/core-darwin-x64/libopentui.dylib artifacts/native-darwin-x64/
          cp packages/core/node_modules/@opentui/core-darwin-arm64/libopentui.dylib artifacts/native-darwin-arm64/
          cp packages/core/node_modules/@opentui/core-linux-x64/libopentui.so artifacts/native-linux-x64/
          cp packages/core/node_modules/@opentui/core-linux-arm64/libopentui.so artifacts/native-linux-arm64/
          cp packages/core/node_modules/@opentui/core-win32-x64/opentui.dll artifacts/native-windows-x64/
          cp packages/core/node_modules/@opentui/core-win32-arm64/opentui.dll artifacts/native-windows-arm64/
          cd artifacts
          zip -r native-darwin-x64.zip native-darwin-x64/
          zip -r native-darwin-arm64.zip native-darwin-arm64/
          zip -r native-linux-x64.zip native-linux-x64/
          zip -r native-linux-arm64.zip native-linux-arm64/
          zip -r native-windows-x64.zip native-windows-x64/
          zip -r native-windows-arm64.zip native-windows-arm64/

      - name: Package npm publish inputs
        run: |
          set -e
          mkdir -p artifacts/npm-packages
          cp -r downloads/js-dists/core-dist artifacts/npm-packages/core-dist
          cp -r downloads/js-dists/react-dist artifacts/npm-packages/react-dist
          cp -r downloads/js-dists/solid-dist artifacts/npm-packages/solid-dist
          cp -r packages/core/node_modules/@opentui artifacts/npm-packages/core-native-packages
          cd artifacts
          zip -r npm-packages.zip npm-packages/

      - name: Upload native binaries artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-binaries-${{ inputs.version }}
          path: |
            artifacts/native-darwin-x64.zip
            artifacts/native-darwin-arm64.zip
            artifacts/native-linux-x64.zip
            artifacts/native-linux-arm64.zip
            artifacts/native-windows-x64.zip
            artifacts/native-windows-arm64.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload npm packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-packages-${{ inputs.version }}
          path: artifacts/npm-packages.zip
          if-no-files-found: error
          retention-days: 30
